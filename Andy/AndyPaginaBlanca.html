<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentoría Vuela | Despega tu Negocio Digital</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Configuración de colores y fuentes -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        serif: ["Playfair Display", "serif"],
                    },
                    colors: {
                        background: "hsl(0 0% 98%)",
                        foreground: "hsl(0 0% 10%)",
                        primary: {
                            DEFAULT: "hsl(38 43% 60%)",
                            foreground: "hsl(0 0% 10%)",
                        },
                        muted: {
                            DEFAULT: "hsl(0 0% 94%)",
                            foreground: "hsl(0 0% 40%)",
                        }
                    },
                    keyframes: {
                        "button-bounce-soft": {
                            "0%, 100%": {
                                transform: "translateY(0)",
                                boxShadow: "0 0 0 0 hsl(38 43% 60% / 0)"
                            },
                            "50%": {
                                transform: "translateY(-3px)",
                                boxShadow: "0 12px 24px -6px hsl(38 43% 60% / 0.35)"
                            },
                        }
                    },
                    animation: {
                        "button-bounce-soft": "button-bounce-soft 6s infinite ease-in-out",
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');
    
    @layer base {
      body {
        @apply bg-background text-foreground font-sans;
      }
    }
  </style>
</head>

<body>
    <div class="min-h-screen selection:bg-primary/30 flex flex-col justify-between">

        <header class="px-6 pt-12 md:pt-20 flex flex-col items-center text-center max-w-4xl mx-auto pb-4 md:pb-6">

            <!-- Logo y Título -->
            <div class="mb-10 flex flex-col items-center justify-center gap-4">
                <div
                    class="w-24 h-24 overflow-hidden rounded-full border-2 border-primary/20 shadow-lg bg-black flex items-center justify-center p-1">
                    <img src="https://vibe.filesafe.space/1775682063663501102/attachments/e2ea9e7d-2b24-4514-bb28-a0a45a9b3002.jpg"
                        alt="Ovejas Voladoras" class="w-full h-full object-contain rounded-full" />
                </div>
                <span class="text-3xl font-serif font-bold tracking-widest text-foreground uppercase">MENTORÍA
                    VUELA</span>
            </div>

            <!-- Etiqueta -->
            <span
                class="px-4 py-1.5 text-xs md:text-sm font-medium tracking-widest text-primary border border-primary/30 rounded-full uppercase bg-primary/5 mb-8">
                PROGRAMA INTENSIVO DE 90 DÍAS
            </span>

            <!-- Titular Principal y Botón -->
            <div class="flex flex-col items-center">
                <h1
                    class="text-4xl md:text-6xl font-serif font-bold text-foreground leading-tight mb-10 uppercase max-w-4xl">
                    CONVIERTE TU CONOCIMIENTO EN UN NEGOCIO RENTABLE Y SAL A VENDER EN 90 DÍAS
                </h1>

                <button
                    class="inline-flex items-center justify-center bg-primary text-primary-foreground hover:bg-primary/90 text-base px-8 py-6 rounded-full font-medium transition-all duration-300 animate-button-bounce-soft hover:-translate-y-1 hover:shadow-[0_0_20px_rgba(255,255,255,0.3)] group relative overflow-hidden cursor-pointer">
                    <span
                        class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-[150%] group-hover:translate-x-[150%] transition-transform duration-1000 ease-in-out"></span>
                    APLICA A MENTORÍA VUELA
                    <!-- Ícono Rocket -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="ml-2 transition-transform duration-300 group-hover:translate-x-1 group-hover:-translate-y-1">
                        <path
                            d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z" />
                        <path
                            d="m12 15-3-3a22 22 0 0 1 3.82-13.82 2.22 2.22 0 0 1 3.16-.21c1.22.95 2.1 2.3 2.52 3.82a22 22 0 0 1-13.82 3.82z" />
                        <path d="M5.32 12.68 8.5 15.86" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Footer -->
        <footer class="py-8 text-center text-sm text-muted-foreground flex flex-col items-center gap-2">
            <p>Copyright 2026 OVEJAS VOLADORAS | MENTORIA VUELA - All rights reserved.</p>
            <div class="flex gap-4 text-xs underline underline-offset-4">
                <a href="#" class="hover:text-foreground transition-colors">Privacidad</a>
                <a href="#" class="hover:text-foreground transition-colors">Términos</a>
            </div>
        </footer>

    </div>
</body>

</html>
